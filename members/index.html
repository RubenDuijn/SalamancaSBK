<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members Login | Salamanca SBK Dance Academy</title>
  <meta name="description" content="Sign in to Salamanca SBK Members Area" />
  <link rel="canonical" href="https://salamancasbk.es/members/" />
  <link rel="alternate" hreflang="en" href="https://salamancasbk.es/members/" />
  <link rel="alternate" hreflang="es" href="https://salamancasbk.es/es/members/" />
  <link rel="alternate" hreflang="x-default" href="https://salamancasbk.es/members/" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#130d11" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .members-auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .members-auth-main {
      flex: 1;
      display: grid;
      align-items: center;
    }

    .auth-wrap {
      width: min(560px, 100%);
      margin: 0 auto;
    }

    .auth-card {
      padding: 1.35rem;
    }

    .members-head-actions {
      display: inline-flex;
      gap: 0;
    }

    .members-lang-group {
      display: inline-flex;
      align-items: center;
      gap: 0.16rem;
      min-height: 32px;
      padding: 0.14rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .members-head-actions .nav-lang {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 29px;
      min-width: 41px;
      padding: 0.26rem 0.54rem;
      border-radius: 999px;
      border: 0;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .members-head-actions .nav-lang:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
    }

    .members-head-actions .nav-lang.nav-lang-active {
      color: #2b190b;
      border-color: rgba(255, 209, 154, 0.8);
      background: linear-gradient(135deg, rgba(242, 167, 76, 0.95), rgba(255, 125, 104, 0.84));
      box-shadow: 0 6px 14px rgba(242, 167, 76, 0.28);
    }

    .members-brand {
      font-size: 1.08rem;
      letter-spacing: -0.005em;
    }

    .wordmark {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: clamp(2rem, 7vw, 2.7rem);
      line-height: 1;
    }

    .subtitle {
      margin: 0.3rem 0 0;
      color: var(--accent-2);
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    .intro {
      margin: 1.05rem 0 1.35rem;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .field {
      margin-bottom: 0.85rem;
    }

    .field label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .field input {
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.24);
      color: var(--text);
      padding: 0.7rem 0.85rem;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus {
      border-color: rgba(242, 167, 76, 0.86);
      box-shadow: 0 0 0 3px rgba(242, 167, 76, 0.2);
    }

    .submit-btn {
      width: 100%;
      border: 0;
    }

    .submit-btn:disabled {
      opacity: 0.75;
      cursor: wait;
      transform: none;
    }

    .message {
      margin-top: 0.8rem;
      min-height: 1.15rem;
      font-size: 0.9rem;
      line-height: 1.35;
      color: var(--muted);
    }

    .message.error {
      color: #ff8f88;
    }

    .message.success {
      color: #bce8c0;
    }

    .helper {
      margin-top: 0.8rem;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .forgot-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--accent-2);
      font-weight: 700;
    }

    .members-mini-footer {
      border-top: 1px solid var(--line);
      padding: 0.95rem 0 1.2rem;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .members-mini-footer .container {
      display: flex;
      justify-content: center;
      text-align: center;
    }

    @media (max-width: 760px) {
      .auth-card {
        padding: 1.1rem;
      }

      .members-brand {
        font-size: 1rem;
      }

      .members-head-actions {
        gap: 0.35rem;
      }
    }
  </style>
</head>
<body id="top" class="members-auth-page">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand members-brand" href="/" aria-label="Salamanca SBK Dance Academy">
        <span class="brand-mark">S</span>
        <span>Salamanca SBK Dance Academy</span>
      </a>
      <div class="members-head-actions" aria-label="Language selector">
        <div class="members-lang-group">
          <a class="nav-lang nav-lang-active" href="/members/" aria-current="page">EN</a>
          <a class="nav-lang" href="/es/members/">ES</a>
        </div>
      </div>
    </div>
  </header>

  <main class="members-auth-main">
    <section class="section">
      <div class="container auth-wrap">
        <article class="hero-card auth-card" aria-labelledby="members-title">
          <h1 class="wordmark" id="members-title">Salamanca SBK Dance Academy</h1>
          <p class="subtitle">Members Area</p>
          <p class="intro">Sign in to access your curriculum and class schedule</p>

          <form id="login-form" novalidate>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>

            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" autocomplete="current-password" required />
            </div>

            <button class="button submit-btn" id="submit-btn" type="submit">Sign in</button>
            <p id="message" class="message" role="alert" aria-live="polite"></p>

            <p class="helper">No account yet? Your teacher will send you an invitation.</p>
            <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
          </form>
        </article>
      </div>
    </section>
  </main>

  <footer class="members-mini-footer">
    <div class="container">
      <span>© <span id="year"></span> Salamanca SBK Dance Academy</span>
    </div>
  </footer>

  <script src="../script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  
     const RAW_SUPABASE_URL = 'https://txansvfngkjtbbdmvgtw.supabase.co';
     const RAW_SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4YW5zdmZuZ2tqdGJiZG12Z3R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDM5MzIsImV4cCI6MjA5MzQ3OTkzMn0.X8eXfZDlORDKzAbr2fsulaRw4vi_4VG4vhV1sPujYCo';

     const SUPABASE_URL = (RAW_SUPABASE_URL || '').trim();
     const SUPABASE_ANON_KEY = (RAW_SUPABASE_ANON_KEY || '').trim();

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const forgotLink = document.getElementById('forgot-link');
    const messageEl = document.getElementById('message');

    function isValidHttpUrl(value) {
      try {
        const url = new URL(value);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch (err) {
        return false;
      }
    }

    let supabaseClient = null;
    if (!isValidHttpUrl(SUPABASE_URL) || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'YOUR_ANON_KEY') {
      setMessage('Supabase configuration is invalid. Please check SUPABASE_URL and SUPABASE_ANON_KEY.', 'error');
      submitBtn.disabled = true;
      forgotLink.style.pointerEvents = 'none';
      forgotLink.style.opacity = '0.6';
    } else {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.classList.remove('error', 'success');
      if (type) {
        messageEl.classList.add(type);
      }
    }

    function normalizeAuthError(error) {
      if (!error) return 'Something went wrong. Please try again.';
      const msg = (error.message || '').toLowerCase();

      if (msg.includes('invalid login credentials')) {
        return 'Incorrect email or password.';
      }
      if (msg.includes('email not confirmed')) {
        return 'Your email is not confirmed yet. Please check your inbox.';
      }
      if (msg.includes('too many requests')) {
        return 'Too many attempts. Please wait a moment and try again.';
      }

      return error.message || 'Something went wrong. Please try again.';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setMessage('');

      if (!supabaseClient) {
        setMessage('Login is temporarily unavailable due to configuration.', 'error');
        return;
      }

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        setMessage('Please enter both email and password.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          setMessage(normalizeAuthError(error), 'error');
          return;
        }

        const userId = data?.user?.id;
        if (!userId) {
          setMessage('Login succeeded but no user was returned.', 'error');
          return;
        }

        const { data: profile, error: profileError } = await supabaseClient
          .from('profiles')
          .select('full_name, level')
          .eq('id', userId)
          .single();

        if (profileError) {
          setMessage('Signed in, but your profile could not be loaded.', 'error');
          return;
        }

        sessionStorage.setItem(
          'sbk_profile',
          JSON.stringify({
            name: profile.full_name,
            level: profile.level,
          })
        );

        window.location.href = '/members/dashboard.html';
      } catch (err) {
        setMessage('Unexpected error while signing in. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });

    forgotLink.addEventListener('click', async (event) => {
      event.preventDefault();
      setMessage('');

      if (!supabaseClient) {
        setMessage('Password reset is temporarily unavailable due to configuration.', 'error');
        return;
      }

      const email = emailInput.value.trim();
      if (!email) {
        setMessage('Enter your email above, then click Forgot password again.', 'error');
        return;
      }

      forgotLink.style.pointerEvents = 'none';
      forgotLink.style.opacity = '0.7';

      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/members/dashboard.html',
        });

        if (error) {
          setMessage(normalizeAuthError(error), 'error');
          return;
        }

        setMessage('Password reset email sent. Please check your inbox.', 'success');
      } catch (err) {
        setMessage('Could not send reset email right now. Please try again.', 'error');
      } finally {
        forgotLink.style.pointerEvents = '';
        forgotLink.style.opacity = '';
      }
    });
  </script>
</body>
</html>
